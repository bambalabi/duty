<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0D1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>תעסוקת חוץ · פלוגה ג׳</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&family=Suez+One&display=swap');
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{margin:0;background:#0D1117;color:#E6EDF3;font-family:'Rubik','Segoe UI','Arial Hebrew',sans-serif;min-height:100vh;padding-bottom:40px}
button{font-family:inherit;cursor:pointer}
button:focus-visible{outline:2px solid #58A6FF;outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}

.topbar{position:sticky;top:0;z-index:10;background:rgba(13,17,23,.96);backdrop-filter:blur(8px);border-bottom:1px solid #21262D;padding:14px 16px 10px}
.wrap{max-width:560px;margin:0 auto}
.hdr{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.title{font-family:'Suez One','Rubik',serif;font-size:19px;line-height:1.2}
.date{font-size:12.5px;color:#8B949E;margin-top:2px}
.hbtns{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.hbtn{background:transparent;border:1px solid #30363D;color:#8B949E;border-radius:8px;padding:6px 10px;font-size:12px;transition:all .15s;white-space:nowrap}
.hbtn.warn{border-color:#F85149;color:#F85149}
.hbtn.primary{border-color:#1F6FEB;color:#58A6FF}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.stat{background:#161B22;border:1px solid #21262D;border-radius:10px;padding:7px 2px;text-align:center}
.stat .n{font-size:20px;font-weight:700;line-height:1.1}
.stat .l{font-size:10.5px;color:#8B949E;margin-top:2px}
.track{height:5px;background:#21262D;border-radius:3px;margin-top:10px;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,#2EA043,#3FB950);border-radius:3px;transition:width .3s}
.plabel{font-size:10.5px;color:#8B949E;text-align:left;margin-top:3px}

.nosave{background:#3D2E00;color:#E3B341;font-size:11.5px;text-align:center;padding:6px 12px;border-bottom:1px solid #5C4400}

.list{max-width:560px;margin:0 auto;padding:14px 12px 0;display:flex;flex-direction:column;gap:12px}
.card{background:#161B22;border:1px solid #21262D;border-radius:14px;padding:12px 14px;border-right:4px solid var(--c)}
.chead{display:flex;align-items:center;justify-content:space-between}
.ctitle{font-size:17px;font-weight:700;color:var(--c)}
.cbadge{font-size:13px;font-weight:700;border-radius:8px;padding:2px 9px;background:color-mix(in srgb,var(--c) 14%,transparent);color:var(--c)}
.csub{font-size:12px;color:#8B949E;margin:2px 0 10px}
.btnrow{display:flex;gap:8px;margin-bottom:10px}
.copy{flex:1;border:1px solid;border-radius:10px;padding:9px 6px;font-size:13.5px;font-weight:600;transition:all .15s}
.copy.out{background:color-mix(in srgb,var(--c) 10%,transparent);border-color:color-mix(in srgb,var(--c) 33%,transparent);color:var(--c)}
.copy.back{background:#23863615;border-color:#3FB95044;color:#3FB950}
.copy.copied{background:#1F6FEB22;border-color:#58A6FF;color:#58A6FF}
.copy:disabled{opacity:.35;cursor:default}

.row{display:flex;align-items:center;gap:9px;padding:7px 0;border-top:1px solid #21262D;min-height:44px}
.chk{width:22px;height:22px;min-width:22px;border-radius:7px;border:1.5px solid #444C56;background:transparent;color:#0D1117;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0;transition:all .15s}
.row.on .chk{background:var(--c);border-color:var(--c)}
.namebtn{flex:1;min-width:0;background:none;border:none;padding:0;text-align:right;display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
.pname{font-size:14.5px;color:#E6EDF3}
.pnum{font-size:13px;color:#8B949E;font-weight:600}
.pnote{font-size:11.5px;color:#8B949E}
.stat{flex:none;min-width:56px;text-align:center;border-radius:999px;padding:4px 8px;font-size:11.5px;font-weight:600;white-space:nowrap}
.stat.s0{color:#566070;border:1.5px dashed #2A323D}
.stat.s1{color:#F0883E;border:1.5px solid #F0883E55;background:#F0883E12}
.stat.s2{color:#3FB950;border:1.5px solid #3FB95055;background:#23863618}
.azuk{border:1.5px solid #444C56;border-radius:999px;padding:4px 8px;font-size:12px;background:transparent;color:#6E7681;transition:all .15s}
.azuk.on{background:#3D2E00;border-color:#E3B341;color:#E3B341}

/* ─── תצוגת טבלה ראשית ─── */
.sheetwrap{max-width:560px;margin:0 auto;padding:12px 12px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.sheet{display:flex;min-width:max-content;border:1px solid #30363D;border-radius:12px;overflow:hidden;background:#10151C}
.scol{width:132px;flex:none;border-left:1px solid #262E38;cursor:pointer}
.scol:last-child{border-left:none}
.scol:active{background:#1A212B}
.shead{background:#1A2230;color:var(--c);font-weight:700;font-size:12.5px;padding:8px 7px;border-bottom:2px solid #30363D;display:flex;align-items:center;justify-content:space-between;gap:4px}
.sname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.scount{flex:none;font-size:10.5px;border-radius:6px;padding:1px 5px;background:color-mix(in srgb,var(--c) 16%,transparent)}
.scell{display:flex;align-items:center;gap:5px;padding:0 7px;min-height:31px;border-bottom:1px solid #1B222C;font-size:11.5px}
.scell.ssel{background:color-mix(in srgb,var(--c) 9%,transparent)}
.sdot{width:7px;height:7px;border-radius:50%;background:#3A4453;flex:none}
.scell.st1 .sdot{background:#F0883E}
.scell.st2 .sdot{background:#3FB950}
.snm{flex:1;color:#C9D1D9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.snm b{color:#8B949E;font-weight:600}
.scell.st2 .snm{color:#5DC97C}
.saz{flex:none;font-size:10px}
.legend{max-width:560px;margin:9px auto 0;padding:0 14px;display:flex;flex-wrap:wrap;gap:5px 14px;font-size:11px;color:#8B949E;align-items:center}
.ldot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-left:5px;vertical-align:1px}

/* ─── פריסה לפי שורות הדף המקורי ─── */
.sheet.grid{display:block;min-width:0;width:100%}
.srow{display:flex}
.srow+.srow{border-top:2px solid #30363D}
.sfill{flex:1 1 auto;background:#0B0F14}
.grid .scol{flex:0 0 var(--w);width:var(--w);min-width:0}
.grid .shead{font-size:calc(var(--fs) + 1px);padding:7px 5px}
.grid .scount{font-size:calc(var(--fs) - 1.5px);padding:1px 4px}
.grid .scell{font-size:var(--fs);padding:0 5px;gap:4px;min-height:calc(var(--fs)*2.5)}
.grid .sdot{width:6px;height:6px}
.grid .saz{font-size:calc(var(--fs) - 1px)}

/* ─── כפתורי הסטטיסטיקה (לחיצים) ─── */
.stats .stat{cursor:pointer;transition:transform .1s,background .15s;position:relative}
.stats .stat:active{transform:scale(.97);background:#1A212B}
.stats .stat::after{content:"›";position:absolute;top:5px;left:7px;color:#444C56;font-size:13px;line-height:1}

/* ─── שורת שם בחלון סטטיסטיקה ─── */
.strow{display:flex;align-items:center;gap:9px;padding:8px 0;border-top:1px solid #21262D;min-height:44px}
.strow.r5{background:#F851490F}
.strow.r5 .pname{color:#FF7B72;font-weight:700}
.stnm{flex:1;min-width:0;display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
.stev{flex:none;font-size:11px;font-weight:600;border-radius:8px;padding:3px 9px;background:color-mix(in srgb,var(--c) 16%,transparent);color:var(--c);white-space:nowrap;max-width:42%;overflow:hidden;text-overflow:ellipsis}
.stedit{flex:none;width:30px;height:30px;border-radius:8px;border:1px solid #30363D;background:transparent;color:#8B949E;font-size:13px;line-height:1}
.stedit:hover,.stedit:active{border-color:var(--c);color:#E6EDF3}
.strow.editing{align-items:stretch}
.editbox{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px}
.editrow{display:flex;gap:8px}
.ename,.enum{background:#0A0D12;border:1px solid #30363D;border-radius:10px;color:#E6EDF3;font-size:16px;padding:9px 11px;font-family:inherit;min-width:0}
.ename{flex:1}
.enum{width:90px;flex:none;text-align:center}
.ename:focus,.enum:focus{outline:none;border-color:var(--c)}
.ename.bad{border-color:#F85149}

/* ─── חלון עמודה ─── */
body.locked{overflow:hidden}
.popwrap{position:fixed;inset:0;z-index:50;background:rgba(4,7,11,.74);backdrop-filter:blur(4px);overflow-y:auto;padding:12px 10px 24px}
.pop{max-width:560px;margin:0 auto;background:#161B22;border:1px solid #30363D;border-right:4px solid var(--c);border-radius:16px;padding:14px}
.phead{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.pclose{width:36px;height:36px;flex:none;border-radius:10px;border:1px solid #30363D;background:transparent;color:#8B949E;font-size:15px}
.ptitles{flex:1;min-width:0}
.ptitles .csub{margin:2px 0 0}
.toolrow{display:flex;gap:8px;margin-bottom:10px}
.tool{flex:1;border:1px solid #30363D;border-radius:10px;padding:8px 6px;font-size:12.5px;font-weight:600;background:transparent;color:#C9D1D9;transition:all .15s}
.tool:disabled{opacity:.35;cursor:default}

.addbtn{width:100%;margin-top:10px;border:1.5px dashed #30363D;border-radius:10px;padding:9px;font-size:13px;font-weight:600;background:transparent;color:#8B949E;transition:all .15s}
.addbtn:hover,.addbtn:active{border-color:color-mix(in srgb,var(--c) 55%,transparent);color:var(--c)}
.addform{margin-top:10px;padding-top:10px;border-top:1px solid #21262D;display:flex;flex-direction:column;gap:8px}
.addr{display:flex;gap:8px}
.addform input{background:#0A0D12;border:1px solid #30363D;border-radius:10px;color:#E6EDF3;font-size:16px;padding:9px 11px;font-family:inherit;min-width:0}
.addform input:focus{outline:none;border-color:var(--c)}
.addform input.bad{border-color:#F85149}
.aname{flex:1}
.anum{width:90px;flex:none;text-align:center}
.anote{width:100%}
.aconfirm{flex:1;border:1px solid color-mix(in srgb,var(--c) 40%,transparent);border-radius:10px;padding:10px;font-size:14px;font-weight:700;background:color-mix(in srgb,var(--c) 15%,transparent);color:var(--c);transition:all .15s}
.acancel{border:1px solid #30363D;border-radius:10px;padding:10px 14px;font-size:13px;background:transparent;color:#8B949E}

/* ─── השבתת עמודה ─── */
.offbtn{width:100%;margin-top:8px;border:1px solid #30363D;border-radius:10px;padding:9px;font-size:13px;font-weight:600;background:transparent;color:#8B949E;transition:all .15s}
.offbtn:hover,.offbtn:active{border-color:#F0883E66;color:#F0883E}
.offbtn.on{border-color:#3FB95066;color:#3FB950;background:#23863612}
.offnote{font-size:12px;color:#F0883E;background:#F0883E12;border:1px solid #F0883E33;border-radius:10px;padding:8px 10px;margin-bottom:10px}
.scol.disabled{opacity:.5;filter:grayscale(.65)}
.scol.disabled .shead{color:#8B949E}
.soff{font-size:10.5px;color:#8B949E;padding:7px;text-align:center;font-weight:600}
.grid .soff{font-size:calc(var(--fs) - 1px)}

/* ─── אזהרת אזוק רמ"ס 5 ─── */
.cuffpop{border-right-color:#F85149}
.cuffwarn{font-size:13.5px;color:#E6EDF3;margin-bottom:8px}
.cuffwarn b{color:#FF7B72}
.cuffq{font-size:14px;font-weight:600;color:#E6EDF3;margin:12px 0 10px;text-align:center}
.cuffrow{display:flex;gap:8px}
.cuffyes{flex:1;border:1px solid #E3B341;border-radius:10px;padding:12px;font-size:14px;font-weight:700;background:#3D2E00;color:#E3B341;transition:all .15s}
.cuffno{flex:1;border:1px solid #30363D;border-radius:10px;padding:12px;font-size:14px;font-weight:600;background:transparent;color:#C9D1D9;transition:all .15s}

/* ─── רמ"ס 5 ─── */
.hbtn.r5{border-color:#F8514966;color:#FF7B72}
.row.r5{background:#F851490F}
.row.r5 .pname{color:#FF7B72;font-weight:700}
.r5tag{flex:none;font-size:10px;font-weight:800;color:#FF7B72;border:1px solid #F8514955;background:#F8514912;border-radius:6px;padding:1px 6px}
.scell.r5{background:#F8514916}
.scell.r5 .snm{color:#FF7B72;font-weight:700}
.r5ta{width:100%;min-height:80px;background:#0A0D12;border:1px solid #30363D;border-radius:10px;color:#E6EDF3;font-size:12.5px;padding:10px;font-family:ui-monospace,monospace;resize:vertical}
.r5ta:focus{outline:none;border-color:#F85149}
.r5msg{font-size:12.5px;margin-top:6px;min-height:17px}
.r5msg.ok{color:#3FB950}
.r5msg.err{color:#F85149}
.r5list{margin-top:4px}
.r5row{display:flex;align-items:center;gap:9px;padding:8px 0;border-top:1px solid #21262D;min-height:40px}
.r5del{width:30px;height:30px;flex:none;border-radius:8px;border:1px solid #30363D;background:transparent;color:#8B949E;font-size:13px}
.r5nm{flex:1;min-width:0;font-size:14px;color:#FF7B72;font-weight:600;overflow-wrap:anywhere}
.r5st{flex:none;font-size:11px;font-weight:700;border-radius:999px;padding:3px 9px;white-space:nowrap}
.r5st.ok{color:#3FB950;border:1.5px solid #3FB95055;background:#23863618}
.r5st.miss{color:#E3B341;border:1.5px solid #E3B34155;background:#3D2E0066}
.r5sug{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:#8B949E;padding:0 39px 8px 0}
.r5fix{border:1px solid #3FB95066;border-radius:8px;padding:4px 10px;font-size:12px;font-weight:600;background:#23863618;color:#3FB950}
.r5empty{font-size:12.5px;color:#8B949E;padding:14px 0;text-align:center;border-top:1px solid #21262D}
.imp{max-width:560px;margin:0 auto;padding:20px 16px}
.imp h2{font-family:'Suez One','Rubik',serif;font-size:18px;margin:0 0 6px}
.steps{font-size:13.5px;color:#8B949E;line-height:1.8;margin:0 0 14px;padding-right:18px}
.imp textarea{width:100%;min-height:180px;background:#0A0D12;border:1px solid #30363D;border-radius:12px;color:#E6EDF3;font-size:13px;padding:12px;direction:ltr;text-align:left;font-family:ui-monospace,monospace;resize:vertical}
.imp textarea:focus{outline:none;border-color:#1F6FEB}
.err{color:#F85149;font-size:13px;margin-top:8px;min-height:18px}
.improw{display:flex;gap:8px;margin-top:10px}
.big{flex:1;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:700;background:#238636;color:#fff;transition:all .15s}
.big.confirm{background:#9E2A2B}
.ghost{border:1px solid #30363D;border-radius:12px;padding:13px 16px;font-size:14px;background:transparent;color:#8B949E}
.foot{text-align:center;font-size:11px;color:#484F58;margin-top:18px;line-height:1.7}

/* ─── דיווח אירוע חדש (תחתית הטבלה) ─── */
.newevwrap{max-width:560px;margin:16px auto 0;padding:0 14px;--c:#3FB950}
.newevbtn{width:100%}
.newevform{background:#161B22;border:1px solid #21262D;border-radius:14px;padding:14px;margin-top:0;border-right:4px solid var(--c)}
.newevhdr{font-size:14px;font-weight:700;color:#3FB950;margin-bottom:2px}
.newevsub{font-size:11.5px;color:#8B949E;margin-bottom:4px}
.nevrow{align-items:stretch}
.nevdel{width:42px;flex:none;border:1px solid #30363D;border-radius:10px;background:transparent;color:#8B949E;font-size:14px}
.nevdel:hover,.nevdel:active{border-color:#F0883E66;color:#F0883E}

/* ─── דף הגדרות ─── */
.settings .sethead{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.settings .sethead h2{margin:0}
.setsec{background:#161B22;border:1px solid #21262D;border-radius:14px;padding:12px 14px;margin-bottom:14px}
.setsec h3{font-size:14px;margin:0 0 8px;color:#E6EDF3}
.setrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid #21262D}
.setsec h3+.setrow{border-top:none}
.setrow label{flex:none;width:84px;font-size:13.5px;color:#C9D1D9}
.setrow input[type=range]{flex:1;min-width:0;accent-color:#1F6FEB;height:24px}
.setval{flex:none;width:48px;text-align:left;font-size:12.5px;color:#8B949E;font-weight:600}
.renrow{gap:8px}
.rendot{width:9px;height:9px;border-radius:50%;background:var(--c);flex:none}
.rendest{flex:1}
.toggle{width:48px;height:27px;flex:none;border-radius:999px;border:1px solid #30363D;background:#21262D;position:relative;padding:0;transition:all .15s}
.toggle .knob{position:absolute;top:2px;right:2px;width:21px;height:21px;border-radius:50%;background:#8B949E;transition:all .15s}
.toggle.on{background:#238636;border-color:#2EA043}
.toggle.on .knob{right:auto;left:2px;background:#fff}

/* ─── גודל טקסט (מתכוונן בהגדרות) ─── */
:root{--tscale:1}
.title{font-size:calc(19px*var(--tscale))}
.date{font-size:calc(12.5px*var(--tscale))}
.stats .stat .n{font-size:calc(20px*var(--tscale))}
.stats .stat .l{font-size:calc(10.5px*var(--tscale))}
.ctitle{font-size:calc(17px*var(--tscale))}
.csub{font-size:calc(12px*var(--tscale))}
.pname{font-size:calc(14.5px*var(--tscale))}
.pnum{font-size:calc(13px*var(--tscale))}
.pnote{font-size:calc(11.5px*var(--tscale))}
.sheet:not(.grid) .scell{font-size:calc(11.5px*var(--tscale))}
.sheet:not(.grid) .shead{font-size:calc(12.5px*var(--tscale))}
.copy{font-size:calc(13.5px*var(--tscale))}
.tool{font-size:calc(12.5px*var(--tscale))}
.hbtn{font-size:calc(12px*var(--tscale))}
.row .stat,.strow .stat{font-size:calc(11.5px*var(--tscale))}
.r5nm{font-size:calc(14px*var(--tscale))}
.foot{font-size:calc(11px*var(--tscale))}
.legend{font-size:calc(11px*var(--tscale))}

/* ─── מצב בהיר ─── */
body.light{background:#F6F8FA;color:#1F2328}
body.light .topbar{background:rgba(255,255,255,.96);border-bottom-color:#D0D7DE}
body.light .title{color:#1F2328}
body.light .nosave{background:#FFF8C5;color:#7D4E00;border-bottom-color:#EAC54F}
body.light .date,body.light .csub,body.light .pnum,body.light .pnote,body.light .plabel,body.light .foot,body.light .legend,body.light .soff,body.light .setval,body.light .newevsub{color:#57606A}
body.light .stat,body.light .card,body.light .setsec,body.light .newevform{background:#FFFFFF;border-color:#D0D7DE}
body.light .track{background:#EAEEF2}
body.light .sheet{background:#FFFFFF;border-color:#D0D7DE}
body.light .scol{border-left-color:#D8DEE4}
body.light .shead{background:#EAEEF2;border-bottom-color:#D0D7DE}
body.light .scell{border-bottom-color:#EAEEF2}
body.light .snm{color:#1F2328}
body.light .snm b{color:#57606A}
body.light .pop{background:#FFFFFF;border-color:#D0D7DE}
body.light .popwrap{background:rgba(140,149,159,.4)}
body.light .row,body.light .strow,body.light .setrow{border-top-color:#EAEEF2}
body.light .pname{color:#1F2328}
body.light .chk{border-color:#AFB8C1;color:#FFFFFF}
body.light .hbtn{border-color:#D0D7DE;color:#57606A}
body.light .tool{border-color:#D0D7DE;color:#1F2328}
body.light .ename,body.light .enum,body.light .addform input,body.light .imp textarea,body.light .r5ta,body.light .setrow input[type=range]{background:#FFFFFF;border-color:#D0D7DE;color:#1F2328}

<body>
<div id="nosave" class="nosave" style="display:none">מצב תצוגה בלבד — שמירה אוטומטית תפעל כשהאתר פתוח מהקישור המאוחסן</div>
<div id="top"></div>
<div id="main"></div>

<script>
'use strict';
// ───────────────────────── מצב גלובלי ─────────────────────────
var PALETTE=['#FF6B6B','#FF922B','#FFD43B','#94D82D','#51CF66','#20C997','#66D9E8','#339AF0','#5C7CFA','#845EF7','#BE4BDB','#F06595','#FF8787','#FAB005','#22B8CF','#B197FC','#69DB7C','#FFA8A8'];
var DATA=null;          // {date, columns:[{dest,noPrefix,people:[{name,num,note}]}]}
var STATE={};           // "ci:pi" -> {s,st,a}  s=מסומן ✓  st=0 לא יצא / 1 בחוץ / 2 חזר  a=אזוק
var VIEW='app';
var OPEN_COL=null;       // אינדקס העמודה הפתוחה בחלון מלא
var OPEN_STAT=null;      // קטגוריית הסטטיסטיקה הפתוחה: 'total' | 'out' | 'back' | 'az'
var ADD_OPEN=null;       // אינדקס העמודה שטופס ההוספה הידנית שלה פתוח
var RAMAS5=[];          // רשימת שמות רמ"ס 5 — מתאפסת בכל טעינת יום חדש
var R5SET={};           // שמות מנורמלים לבדיקה מהירה
var R5_OPEN=false;      // האם חלון ניהול רמ"ס 5 פתוח
var R5MSG=null;         // הודעת משוב בחלון רמ"ס 5 {text,err}
var R5CUFF=null;        // אזהרת אזוק לפני יציאה {ci, list:[{pi,name,num}]}
var R5UNCUFF=null;      // אזהרת החזרת אזיקים בחזרה {ci, list:[{pi,name,num}]}
var OFF_CONFIRM=null;   // אינדקס עמודה הממתינה לאישור השבתה
var EDIT_NAME=null;     // עריכת שם בחלון הסטטיסטיקה {ci,pi}
var NEWEV=null;         // טופס דיווח אירוע חדש {title, rows:[{name,num}]}
var PREFS={textSize:1,zoom:1,light:false}; // העדפות תצוגה/נגישות
var CAN_SAVE=true;
try{localStorage.setItem('__t','1');localStorage.removeItem('__t');}catch(e){CAN_SAVE=false;}

function save(){
  if(!CAN_SAVE)return;
  try{
    localStorage.setItem('dutyData',JSON.stringify(DATA));
    localStorage.setItem('dutyState',JSON.stringify(STATE));
    localStorage.setItem('dutyR5',JSON.stringify(RAMAS5));
  }catch(e){}
}
function loadPrefs(){
  if(!CAN_SAVE)return;
  try{
    var p=localStorage.getItem('dutyPrefs');
    if(p){
      var o=JSON.parse(p)||{};
      if(o.textSize)PREFS.textSize=+o.textSize;
      if(o.zoom)PREFS.zoom=+o.zoom;
      PREFS.light=!!o.light;
    }
  }catch(e){}
}
function savePrefs(){
  if(!CAN_SAVE)return;
  try{localStorage.setItem('dutyPrefs',JSON.stringify(PREFS));}catch(e){}
}
function applyPrefs(){
  var el=document.documentElement;
  el.style.setProperty('--tscale',PREFS.textSize||1);
  el.style.zoom=(PREFS.zoom&&PREFS.zoom!==1)?PREFS.zoom:'';
  document.body.classList.toggle('light',!!PREFS.light);
}
function load(){
  if(!CAN_SAVE)return;
  try{
    var d=localStorage.getItem('dutyData');
    var s=localStorage.getItem('dutyState');
    if(d)DATA=JSON.parse(d);
    if(s)STATE=JSON.parse(s)||{};
    var r=localStorage.getItem('dutyR5');
    if(r)RAMAS5=JSON.parse(r)||[];
    if(!Array.isArray(RAMAS5))RAMAS5=[];
    Object.keys(STATE).forEach(function(k){          // המרה מפורמט ישן {s,r,a}
      var v=STATE[k];
      if(v&&typeof v==='object'&&!('st' in v))STATE[k]={s:0,st:v.s?(v.r?2:1):0,a:v.a?1:0};
    });
  }catch(e){DATA=null;STATE={};RAMAS5=[];}
}
function defaults(){
  var o={};
  DATA.columns.forEach(function(c,ci){c.people.forEach(function(_,pi){o[ci+':'+pi]={s:0,st:0,a:0,ao:0};});});
  return o;
}
function st(ci,pi){
  var k=ci+':'+pi;
  if(!STATE[k])STATE[k]={s:0,st:0,a:0,ao:0};
  return STATE[k];
}
var esc=function(s){return String(s).replace(/[&<>"']/g,function(m){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];});};

// ───────────────────────── רמ"ס 5 ─────────────────────────
function norm(s){
  return String(s||'').replace(/[־\-–]/g,' ').replace(/["'`´׳״’‘.]/g,'').replace(/\s+/g,' ').trim();
}
function rebuildR5(){
  R5SET={};
  RAMAS5.forEach(function(n){var k=norm(n);if(k)R5SET[k]=1;});
}
function isR5(name){return R5SET[norm(name)]===1;}
function tableNames(){
  var out=[],seen={};
  if(DATA)DATA.columns.forEach(function(c){c.people.forEach(function(p){
    var k=norm(p.name);
    if(k&&seen[k]!==1){seen[k]=1;out.push({raw:p.name,key:k});}
  });});
  return out;
}
function lev(a,b){
  var m=a.length,n=b.length,i,j,t;
  if(!m)return n;
  if(!n)return m;
  var prev=[],cur=[];
  for(j=0;j<=n;j++)prev[j]=j;
  for(i=1;i<=m;i++){
    cur[0]=i;
    for(j=1;j<=n;j++)cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+(a.charAt(i-1)===b.charAt(j-1)?0:1));
    t=prev;prev=cur;cur=t;
  }
  return prev[n];
}
function r5Candidate(name){
  var k=norm(name);
  if(!k)return null;
  var best=null,bestD=99;
  tableNames().forEach(function(n){
    if(n.key===k)return;
    var d=((k.length>=4&&n.key.indexOf(k)>-1)||(n.key.length>=4&&k.indexOf(n.key)>-1))?1:lev(k,n.key);
    if(d<bestD){bestD=d;best=n;}
  });
  if(!best)return null;
  var lim=Math.min(3,Math.max(1,Math.floor(Math.max(k.length,best.key.length)/4)));
  return bestD<=lim?best.raw:null;
}
function parseR5(txt){
  var t=(txt||'').trim();
  t=t.replace(/^`{3,}\s*json\s*/i,'').replace(/^`{3,}\s*/,'').replace(/`{3,}\s*$/,'').trim();
  if(!t)throw 'ההדבקה ריקה — הדבק את הבלוק שקלוד החזיר.';
  var obj;
  try{obj=JSON.parse(t);}catch(e){throw 'ה-JSON לא תקין. העתק שוב את הבלוק המלא מקלוד.';}
  var arr=Array.isArray(obj)?obj:(obj&&obj.ramas5);
  if(!Array.isArray(arr)||arr.length===0)throw 'לא נמצאה רשימת ramas5 בנתונים.';
  return arr.map(function(n){return String(n==null?'':n).trim();}).filter(Boolean);
}
function addR5(name){
  var k=norm(name);
  if(!k)return false;
  if(RAMAS5.some(function(e){return norm(e)===k;}))return false;
  RAMAS5.push(String(name).trim());
  return true;
}


// ───────────────────────── ייבוא JSON ─────────────────────────
function parseImport(txt){
  var t=(txt||'').trim();
  t=t.replace(/^`{3,}\s*json\s*/i,'').replace(/^`{3,}\s*/,'').replace(/`{3,}\s*$/,'').trim();
  var obj;
  try{obj=JSON.parse(t);}catch(e){throw 'ה-JSON לא תקין. העתק שוב את הבלוק המלא מקלוד ונסה שוב.';}
  if(!obj||!Array.isArray(obj.columns)||obj.columns.length===0)throw 'חסרה רשימת columns בנתונים.';
  obj.columns.forEach(function(c,i){
    if(!c.dest)throw 'לעמודה מספר '+(i+1)+' חסר שדה dest.';
    if(!Array.isArray(c.people))throw 'לעמודה "'+c.dest+'" חסרה רשימת people.';
    c.noPrefix=!!c.noPrefix;
    c.disabled=!!c.disabled;
    if(c.row!=null){var rr=parseInt(c.row,10);if(isFinite(rr)&&rr>0)c.row=rr;else delete c.row;}
    c.people.forEach(function(p){
      if(!p.name)throw 'נמצא שם ריק בעמודה "'+c.dest+'".';
      p.num=p.num==null?'':String(p.num);
      p.note=p.note?String(p.note):'';
    });
  });
  if(!obj.date)obj.date='';
  return obj;
}

// ───────────────────────── העתקה ─────────────────────────
function fallbackCopy(text){
  try{
    var ta=document.createElement('textarea');
    ta.value=text;ta.setAttribute('readonly','');
    ta.style.cssText='position:fixed;top:-999px;opacity:0';
    document.body.appendChild(ta);ta.focus();ta.select();
    var ok=document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  }catch(e){return false;}
}
function copyText(text,btn){
  var done=function(){flash(btn);};
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(function(){if(fallbackCopy(text))done();});
  }else if(fallbackCopy(text)){done();}
}
function flash(btn){
  if(!btn)return;
  btn.textContent='✓ הועתק';
  btn.classList.add('copied');
  clearTimeout(btn._t);
  btn._t=setTimeout(function(){
    btn.textContent=btn.getAttribute('data-label');
    btn.classList.remove('copied');
  },2000);
}

// ───────────────────────── הודעות וואטסאפ ─────────────────────────
function lineFor(p){return (p.name+' '+p.num).trim();}   // ללא הערות וללא אזוק
function outMsg(ci){
  var c=DATA.columns[ci];
  var sel=c.people.filter(function(_,pi){return st(ci,pi).s;});
  if(!sel.length)return null;
  var title=c.noPrefix?c.dest:((sel.length===1?'יוצא':'יוצאים')+' ל'+c.dest);
  return '*'+title+'*\n'+sel.map(lineFor).join('\n');
}
function backMsg(ci){
  var c=DATA.columns[ci];
  var sel=c.people.filter(function(_,pi){return st(ci,pi).s;});
  if(!sel.length)return null;
  var title=(sel.length===1?'חזר':'חזרו')+' מ'+c.dest;
  return '*'+title+'*\n'+sel.map(lineFor).join('\n');
}

// ───────────────────────── רנדור ─────────────────────────
function totals(){
  var total=0,out=0,back=0,az=0;
  if(DATA)DATA.columns.forEach(function(c,ci){if(c.disabled)return;c.people.forEach(function(_,pi){
    var x=st(ci,pi);total++;
    if(x.st===1)out++;
    if(x.st===2)back++;
    if((x.a&&x.st!==2)||x.ao)az++;
  });});
  return{total:total,out:out,back:back,az:az};
}
function renderTop(){
  var top=document.getElementById('top');
  if(!DATA||VIEW==='import'||VIEW==='settings'){top.innerHTML='';return;}
  var t=totals();
  var pct=t.total===0?0:Math.round(t.back/t.total*100);
  top.innerHTML=
  '<div class="topbar"><div class="wrap">'+
    '<div class="hdr">'+
      '<div><div class="title">תעסוקת חוץ · פלוגה ג׳</div>'+
      '<div class="date">'+esc(DATA.date||'')+'</div></div>'+
      '<div class="hbtns">'+
        '<button class="hbtn primary" data-act="newday">📥 יום חדש</button>'+
        '<button class="hbtn" data-act="reset" data-label="איפוס יום">איפוס יום</button>'+
        '<button class="hbtn r5" data-act="openr5">🔴 רמ"ס 5'+(RAMAS5.length?' · '+RAMAS5.length:'')+'</button>'+
        '<button class="hbtn" data-act="opensettings" aria-label="הגדרות">⚙️ הגדרות</button>'+
      '</div>'+
    '</div>'+
    '<div class="stats">'+
      '<div class="stat" data-act="openstat" data-stat="total" role="button" tabindex="0"><div class="n" style="color:#58A6FF">'+t.total+'</div><div class="l">יוצאים</div></div>'+
      '<div class="stat" data-act="openstat" data-stat="back" role="button" tabindex="0"><div class="n" style="color:#3FB950">'+t.back+'</div><div class="l">חזרו</div></div>'+
      '<div class="stat" data-act="openstat" data-stat="out" role="button" tabindex="0"><div class="n" style="color:'+(t.out>0?'#F0883E':'#3FB950')+'">'+t.out+'</div><div class="l">בחוץ</div></div>'+
      '<div class="stat" data-act="openstat" data-stat="az" role="button" tabindex="0"><div class="n" style="color:'+(t.az>0?'#E3B341':'#3FB950')+'">'+t.az+'</div><div class="l">🔗 אזוקים</div></div>'+
    '</div>'+
    '<div class="track"><div class="fill" style="width:'+pct+'%"></div></div>'+
    '<div class="plabel">'+pct+'% חזרו</div>'+
  '</div></div>';
}
function colHtml(ci){
  var c=DATA.columns[ci];
  var color=PALETTE[ci%PALETTE.length];
  if(c.disabled){
    return '<div class="scol disabled" data-act="opencol" data-ci="'+ci+'" style="--c:'+color+'">'+
      '<div class="shead"><span class="sname">'+esc(c.dest)+'</span><span class="scount">🚫</span></div>'+
      '<div class="soff">מושבת · הקש להפעלה</div>'+
    '</div>';
  }
  var h='<div class="scol" data-act="opencol" data-ci="'+ci+'" style="--c:'+color+'">'+
    '<div class="shead"><span class="sname">'+esc(c.dest)+'</span><span class="scount">'+c.people.length+'</span></div>';
  c.people.forEach(function(p,pi){
    var x=st(ci,pi);
    h+='<div class="scell st'+x.st+(x.s?' ssel':'')+(isR5(p.name)?' r5':'')+'">'+
      '<span class="sdot"></span>'+
      '<span class="snm">'+esc(p.name)+(p.num?' <b>'+esc(p.num)+'</b>':'')+'</span>'+
      (x.a?'<span class="saz">🔗</span>':'')+
    '</div>';
  });
  return h+'</div>';
}
function rowGroups(){
  var map={},order=[],last=null,has=false;
  DATA.columns.forEach(function(c,ci){
    var r=c.row!=null?parseInt(c.row,10):NaN;
    if(isFinite(r)&&r>0){has=true;last=r;}else{r=last==null?1:last;}
    if(!map[r]){map[r]=[];order.push(r);}
    map[r].push(ci);
  });
  if(!has)return null;
  order.sort(function(a,b){return a-b;});
  return order.map(function(r){return map[r];});
}
function renderApp(){
  var ow=document.querySelector('.sheetwrap');var sx=ow?ow.scrollLeft:0;
  var op=document.querySelector('.popwrap');var sy=op?op.scrollTop:0;
  var rows=rowGroups();
  var html;
  if(rows){
    var maxN=1;rows.forEach(function(r){if(r.length>maxN)maxN=r.length;});
    var fs=(maxN<=3?11.5:(maxN===4?10.5:(maxN===5?9.5:(maxN===6?8.5:8))))*(PREFS.textSize||1);
    html='<div class="sheetwrap"><div class="sheet grid" style="--w:'+(100/maxN).toFixed(3)+'%;--fs:'+fs+'px">';
    rows.forEach(function(r){
      html+='<div class="srow">';
      r.forEach(function(ci){html+=colHtml(ci);});
      if(r.length<maxN)html+='<div class="sfill"></div>';
      html+='</div>';
    });
    html+='</div></div>';
  }else{
    html='<div class="sheetwrap"><div class="sheet">';
    DATA.columns.forEach(function(_,ci){html+=colHtml(ci);});
    html+='</div></div>';
  }
  html+='<div class="legend">'+
    '<span><i class="ldot" style="background:#3A4453"></i>לא יצא</span>'+
    '<span><i class="ldot" style="background:#F0883E"></i>בחוץ</span>'+
    '<span><i class="ldot" style="background:#3FB950"></i>חזר</span>'+
    '<span>🔗 אזוק</span>'+
    '<span><i class="ldot" style="background:#F85149"></i>רמ"ס 5</span>'+
  '</div>';
  html+=renderNewEvent();
  html+='<div class="foot">לחץ על עמודה כדי לפתוח אותה<br>הסטטוס נשמר אוטומטית במכשיר זה</div>';
  if(OPEN_COL!==null&&DATA.columns[OPEN_COL])html+=renderPopup(OPEN_COL);
  if(R5_OPEN)html+=renderR5();
  if(OPEN_STAT)html+=renderStatPopup(OPEN_STAT);
  if(R5CUFF)html+=renderCuff();
  if(R5UNCUFF)html+=renderUncuff();
  if(OFF_CONFIRM!==null)html+=renderOffConfirm();
  document.getElementById('main').innerHTML=html;
  var nw=document.querySelector('.sheetwrap');if(nw)nw.scrollLeft=sx;
  var np=document.querySelector('.popwrap');if(np)np.scrollTop=sy;
  document.body.classList.toggle('locked',OPEN_COL!==null||R5_OPEN||!!OPEN_STAT||!!R5CUFF||!!R5UNCUFF||OFF_CONFIRM!==null);
}
function renderPopup(ci){
  var c=DATA.columns[ci];
  var color=PALETTE[ci%PALETTE.length];
  var sel=0,out=0,back=0;
  c.people.forEach(function(_,pi){var x=st(ci,pi);if(x.s)sel++;if(x.st===1)out++;if(x.st===2)back++;});
  var allSel=c.people.length>0&&sel===c.people.length;
  var h='<div class="popwrap" data-act="closecol"><div class="pop" data-act="pop" style="--c:'+color+'">'+
    '<div class="phead">'+
      '<button class="pclose" data-act="closecol" aria-label="סגור">✕</button>'+
      '<div class="ptitles"><div class="ctitle">'+esc(c.dest)+'</div>'+
      '<div class="csub">נבחרו '+sel+' · בחוץ '+out+' · חזרו '+back+'</div></div>'+
      '<div class="cbadge">'+c.people.length+'</div>'+
    '</div>'+
    (c.disabled?'<div class="offnote">עמודה זו מושבתת ולא נכללת בסיכומים. הקש "הפעל עמודה מחדש" כדי להחזירה.</div>':'')+
    '<div class="btnrow">'+
      '<button class="copy out" data-act="copyout" data-ci="'+ci+'" data-label="📋 העתק יציאה" '+(sel===0?'disabled':'')+'>📋 העתק יציאה</button>'+
      (c.noPrefix?'':'<button class="copy back" data-act="copyback" data-ci="'+ci+'" data-label="📋 העתק חזרה" '+(sel===0?'disabled':'')+'>📋 העתק חזרה</button>')+
    '</div>'+
    '<div class="toolrow">'+
      '<button class="tool" data-act="selall" data-ci="'+ci+'">'+(allSel?'☐ נקה הכל':'☑ בחר הכל')+'</button>'+
      '<button class="tool" data-act="invert" data-ci="'+ci+'">🔁 החלף סימון</button>'+
      '<button class="tool" data-act="revert" data-ci="'+ci+'" '+(sel===0?'disabled':'')+'>⏪ החזר סטטוס אחורה</button>'+
    '</div>'+
    '<div>';
  c.people.forEach(function(p,pi){
    var x=st(ci,pi);
    var r5=isR5(p.name);
    h+='<div class="row'+(x.s?' on':'')+(r5?' r5':'')+'" style="--c:'+color+'">'+
      '<button class="chk" data-act="sel" data-ci="'+ci+'" data-pi="'+pi+'" aria-label="'+(x.s?'בטל בחירה':'בחר')+'">'+(x.s?'✓':'')+'</button>'+
      '<button class="namebtn" data-act="sel" data-ci="'+ci+'" data-pi="'+pi+'">'+
        '<span class="pname">'+esc(p.name)+'</span>'+
        '<span class="pnum">'+esc(p.num)+'</span>'+
        (r5?'<span class="r5tag">רמ"ס 5</span>':'')+
        (p.note?'<span class="pnote">('+esc(p.note)+')</span>':'')+
      '</button>'+
      '<button class="azuk'+(x.a?' on':'')+'" data-act="azuk" data-ci="'+ci+'" data-pi="'+pi+'" aria-label="אזוק">🔗'+(x.a?' אזוק':'')+'</button>'+
      '<span class="stat s'+x.st+'">'+(x.st===2?'✓ חזר':(x.st===1?'בחוץ':'לא יצא'))+'</span>'+
    '</div>';
  });
  h+='</div>';
  if(ADD_OPEN===ci){
    h+='<div class="addform">'+
      '<div class="addr">'+
        '<input class="aname" id="addname" placeholder="שם מלא" autocomplete="off">'+
        '<input class="anum" id="addnum" placeholder="מס׳" inputmode="numeric" autocomplete="off">'+
      '</div>'+
      '<input class="anote" id="addnote" placeholder="הערה (לא חובה)" autocomplete="off">'+
      '<div class="addr">'+
        '<button class="aconfirm" data-act="addconfirm" data-ci="'+ci+'">✓ הוסף לרשימה</button>'+
        '<button class="acancel" data-act="addcancel">ביטול</button>'+
      '</div>'+
    '</div>';
  }else{

function collectStat(kind){
  var out=[];
  if(!DATA)return out;
  DATA.columns.forEach(function(c,ci){
    if(c.disabled)return;
    var color=PALETTE[ci%PALETTE.length];
    c.people.forEach(function(p,pi){
      var x=st(ci,pi),match=false;
      if(kind==='total')match=true;
      else if(kind==='out')match=x.st===1;
      else if(kind==='back')match=x.st===2;
      else if(kind==='az')match=(!!x.a&&x.st!==2)||!!x.ao;
      if(match)out.push({p:p,x:x,dest:c.dest,color:color,ci:ci,pi:pi});
    });
  });
  return out;
}
function statMeta(kind){
  if(kind==='out')return{title:'בחוץ',color:'#F0883E',sub:'מי שיצא וטרם חזר'};
  if(kind==='back')return{title:'חזרו',color:'#3FB950',sub:'מי שכבר חזר'};
  if(kind==='az')return{title:'🔗 אזוקים',color:'#E3B341',sub:'אזוקים שטרם חזרו'};
  return{title:'כל היוצאים',color:'#58A6FF',sub:'כל השמות בטבלה של היום'};
}

document.addEventListener('click',function(ev){
  var btn=ev.target.closest('[data-act]');
  if(!btn)return;
  var act=btn.getAttribute('data-act');
  var ci=+btn.getAttribute('data-ci');
  var pi=+btn.getAttribute('data-pi');

  if(act==='sel'){
    var x=st(ci,pi);
    x.s=x.s?0:1;
    save();render();
  }
  else if(act==='azuk'){
    var x3=st(ci,pi);
    x3.a=x3.a?0:1;
    save();render();
  }
  else if(act==='opencol'){
    OPEN_COL=ci;ADD_OPEN=null;OPEN_STAT=null;render();
  }
  else if(act==='closecol'){
    OPEN_COL=null;ADD_OPEN=null;render();
  }
  else if(act==='openstat'){
    OPEN_STAT=btn.getAttribute('data-stat')||'total';
    OPEN_COL=null;R5_OPEN=false;ADD_OPEN=null;EDIT_NAME=null;render();
  }
  else if(act==='closestat'){
    OPEN_STAT=null;EDIT_NAME=null;render();
  }
  else if(act==='editname'){
    EDIT_NAME={ci:ci,pi:pi};render();
    var ee=document.getElementById('ename');
    if(ee){ee.focus();ee.select();}
  }
  else if(act==='editsave'){
    var enEl=document.getElementById('ename');
    var nm2=(enEl&&enEl.value||'').trim();
    if(!nm2){if(enEl){enEl.classList.add('bad');enEl.focus();}return;}
    var enumEl=document.getElementById('enum');
    if(DATA.columns[ci]&&DATA.columns[ci].people[pi]){
      DATA.columns[ci].people[pi].name=nm2;
      DATA.columns[ci].people[pi].num=(enumEl&&enumEl.value||'').trim();
    }
    EDIT_NAME=null;save();render();
  }
  else if(act==='editcancel'){
    EDIT_NAME=null;render();
  }
  else if(act==='opensettings'){
    VIEW='settings';OPEN_COL=null;OPEN_STAT=null;R5_OPEN=false;ADD_OPEN=null;EDIT_NAME=null;NEWEV=null;
    render();window.scrollTo(0,0);
  }
  else if(act==='closesettings'){
    VIEW='app';render();window.scrollTo(0,0);
  }
  else if(act==='togglelight'){
    PREFS.light=!PREFS.light;applyPrefs();savePrefs();render();
  }
  else if(act==='resetprefs'){
    PREFS={textSize:1,zoom:1,light:false};applyPrefs();savePrefs();render();
  }
  else if(act==='renamesave'){
    if(!DATA)return;
    var changed=0;
    DATA.columns.forEach(function(c,ci){
      var el=document.getElementById('rndest_'+ci);
      if(el){var v=el.value.trim();if(v&&v!==c.dest){c.dest=v;changed++;}}
    });
    save();
    var rm=document.getElementById('renmsg');
    if(rm)rm.textContent=changed?('✓ עודכנו '+changed+' שמות'):'אין שינויים לשמירה';
  }
  else if(act==='nevopen'){
    NEWEV={title:'',rows:[{name:'',num:''}]};render();
    var nt=document.getElementById('nevtitle');if(nt)nt.focus();
  }
  else if(act==='nevcancel'){
    NEWEV=null;render();
  }
  else if(act==='nevaddrow'){
    syncNewev();NEWEV.rows.push({name:'',num:''});render();
    var nn=document.getElementById('nevname_'+(NEWEV.rows.length-1));if(nn)nn.focus();
  }
  else if(act==='nevdelrow'){
    var ri=+btn.getAttribute('data-i');
    syncNewev();
    if(NEWEV&&NEWEV.rows.length>1&&isFinite(ri)){NEWEV.rows.splice(ri,1);render();}
  }
  else if(act==='nevconfirm'){
    syncNewev();
    var nevErr=document.getElementById('neverr');
    var nevTitle=(NEWEV.title||'').trim();
    if(!nevTitle){
      if(nevErr)nevErr.textContent='יש להזין כותרת לאירוע.';
      var ntb=document.getElementById('nevtitle');if(ntb){ntb.classList.add('bad');ntb.focus();}
      return;
    }
    var nevPeople=NEWEV.rows.map(function(r){
      return{name:(r.name||'').trim(),num:(r.num||'').trim(),note:''};
    }).filter(function(pp){return pp.name;});
    if(!nevPeople.length){
      if(nevErr)nevErr.textContent='יש להזין לפחות שם אחד.';
      return;
    }
    DATA.columns.push({dest:nevTitle,noPrefix:false,disabled:false,people:nevPeople});
    var nci=DATA.columns.length-1;
    nevPeople.forEach(function(_,pp){STATE[nci+':'+pp]={s:0,st:0,a:0,ao:0};});
    NEWEV=null;save();render();
  }
  else if(act==='selall'){
    var all=DATA.columns[ci].people.length>0&&DATA.columns[ci].people.every(function(_,pi){return st(ci,pi).s;});
    DATA.columns[ci].people.forEach(function(_,pi){st(ci,pi).s=all?0:1;});
    save();render();
  }
  else if(act==='invert'){
    DATA.columns[ci].people.forEach(function(_,pi){var v=st(ci,pi);v.s=v.s?0:1;});
    save();render();
  }
  else if(act==='revert'){
    DATA.columns[ci].people.forEach(function(_,pi){var v=st(ci,pi);if(v.s&&v.st>0)v.st--;});
    save();render();
  }
  else if(act==='copyout'){
    if(!outMsg(ci))return;
    var pend=r5PendingCuff(ci);
    if(pend.length){R5CUFF={ci:ci,list:pend};render();return;}
    applyOut(ci);
  }
  else if(act==='cuffyes'){
    if(R5CUFF){
      var cc=R5CUFF.ci;
      R5CUFF.list.forEach(function(it){st(cc,it.pi).a=1;});
      R5CUFF=null;applyOut(cc);
    }
  }
  else if(act==='cuffno'){
    if(R5CUFF){var cc2=R5CUFF.ci;R5CUFF=null;applyOut(cc2);}
  }
  else if(act==='cuffcancel'){
    R5CUFF=null;render();
  }
  else if(act==='toggleoff'){
    if(DATA.columns[ci].disabled){DATA.columns[ci].disabled=false;save();render();}
    else{OFF_CONFIRM=ci;render();}
  }
  else if(act==='offconfirm'){
    if(OFF_CONFIRM!==null&&DATA.columns[OFF_CONFIRM]){DATA.columns[OFF_CONFIRM].disabled=true;}
    OFF_CONFIRM=null;save();render();
  }
  else if(act==='offcancel'){
    OFF_CONFIRM=null;render();
  }
  else if(act==='copyback'){
    if(!backMsg(ci))return;
    var pendB=r5ReturnCuff(ci);
    if(pendB.length){R5UNCUFF={ci:ci,list:pendB};render();return;}
    applyBack(ci);
  }
  else if(act==='uncuffyes'){
    if(R5UNCUFF){
      var uc=R5UNCUFF.ci;
      R5UNCUFF.list.forEach(function(it){var x=st(uc,it.pi);x.a=0;x.ao=0;});
      R5UNCUFF=null;applyBack(uc);
    }
  }
  else if(act==='uncuffno'){
    if(R5UNCUFF){
      var uc2=R5UNCUFF.ci;
      R5UNCUFF.list.forEach(function(it){st(uc2,it.pi).ao=1;});
      R5UNCUFF=null;applyBack(uc2);
    }
  }
  else if(act==='uncuffcancel'){
    R5UNCUFF=null;render();
  }
  else if(act==='addopen'){
    ADD_OPEN=ci;render();
    var ae=document.getElementById('addname');
    if(ae)ae.focus();
  }
  else if(act==='addcancel'){
    ADD_OPEN=null;render();
  }
  else if(act==='addconfirm'){
    var nameEl=document.getElementById('addname');
    var nm=(nameEl&&nameEl.value||'').trim();
    if(!nm){if(nameEl){nameEl.classList.add('bad');nameEl.focus();}return;}
    var numEl=document.getElementById('addnum');
    var noteEl=document.getElementById('addnote');
    var col=DATA.columns[ci];
    col.people.push({name:nm,num:(numEl&&numEl.value||'').trim(),note:(noteEl&&noteEl.value||'').trim()});
    STATE[ci+':'+(col.people.length-1)]={s:1,st:0,a:0};
    ADD_OPEN=null;
    save();render();
  }
  else if(act==='newday'){
    VIEW='import';render();
  }
  else if(act==='cancelimport'){
    VIEW='app';render();
  }
  else if(act==='reset'){
    if(btn.getAttribute('data-armed')){
      STATE=defaults();save();render();
    }else{
      btn.setAttribute('data-armed','1');
      btn.textContent='בטוח? לחץ שוב';
      btn.classList.add('warn');
      setTimeout(function(){
        btn.removeAttribute('data-armed');
        btn.textContent=btn.getAttribute('data-label');
        btn.classList.remove('warn');
      },2500);
    }
  }
  else if(act==='openr5'){
    R5_OPEN=true;OPEN_COL=null;ADD_OPEN=null;OPEN_STAT=null;R5MSG=null;render();
  }
  else if(act==='closer5'){
    R5_OPEN=false;R5MSG=null;render();
  }
  else if(act==='r5import'){
    var ta=document.getElementById('r5json');
    var tv=ta?ta.value:'';
    var names;
    try{names=parseR5(tv);}
    catch(msg){
      R5MSG={text:typeof msg==='string'?msg:'שגיאה בקריאת הנתונים.',err:true};
      render();
      var ta2=document.getElementById('r5json');
      if(ta2)ta2.value=tv;
      return;
    }
    var added=0,dup=0;
    names.forEach(function(n){if(addR5(n))added++;else dup++;});
    rebuildR5();
    R5MSG={text:'✓ נוספו '+added+' שמות'+(dup?' · '+dup+' כבר היו ברשימה':''),err:false};
    save();render();
  }
  else if(act==='r5add'){
    var ne=document.getElementById('r5name');
    var nv=(ne&&ne.value||'').trim();
    if(!nv){if(ne){ne.classList.add('bad');ne.focus();}return;}
    if(addR5(nv)){rebuildR5();R5MSG=null;save();render();}
    else{R5MSG={text:'"'+nv+'" כבר נמצא ברשימה.',err:true};render();}
  }
  else if(act==='r5del'){
    var di=+btn.getAttribute('data-i');
    if(isFinite(di)&&RAMAS5[di]!=null){RAMAS5.splice(di,1);rebuildR5();R5MSG=null;save();render();}
  }
  else if(act==='r5fix'){
    var fi=+btn.getAttribute('data-i');
    var fn=btn.getAttribute('data-n')||'';
    if(isFinite(fi)&&fn&&RAMAS5[fi]!=null){
      var fk=norm(fn);
      if(RAMAS5.some(function(e,j){return j!==fi&&norm(e)===fk;}))RAMAS5.splice(fi,1);
      else RAMAS5[fi]=fn;
      rebuildR5();R5MSG=null;save();render();
    }
  }
  else if(act==='r5clear'){
    if(btn.getAttribute('data-armed')){
      RAMAS5=[];rebuildR5();R5MSG=null;save();render();
    }else{
      btn.setAttribute('data-armed','1');
      btn.textContent='בטוח? לחץ שוב למחיקת כל הרשימה';
      btn.style.borderColor='#F85149';btn.style.color='#F85149';
      setTimeout(function(){
        if(btn.isConnected){
          btn.removeAttribute('data-armed');
          btn.textContent=btn.getAttribute('data-label');
          btn.style.borderColor='';btn.style.color='';
        }
      },2500);
    }
  }
  else if(act==='doimport'){
    var box=document.getElementById('impbox');
    var errEl=document.getElementById('imperr');
    errEl.textContent='';
    var obj;
    try{obj=parseImport(box.value);}
    catch(msg){errEl.textContent=typeof msg==='string'?msg:'שגיאה בקריאת הנתונים.';return;}
    if(DATA&&!btn.getAttribute('data-armed')){
      btn.setAttribute('data-armed','1');
      btn.textContent='זה ימחק את יום '+(DATA.date||'הנוכחי')+' — לחץ שוב לאישור';
      btn.classList.add('confirm');
      setTimeout(function(){
        if(document.getElementById('impbtn')){
          btn.removeAttribute('data-armed');
          btn.textContent='טען יום חדש (יחליף את הקיים)';
          btn.classList.remove('confirm');
        }
      },4000);
      return;
    }
    DATA=obj;
    STATE=defaults();
    OPEN_COL=null;
    OPEN_STAT=null;
    ADD_OPEN=null;
    RAMAS5=[];
    rebuildR5();
    R5_OPEN=false;
    R5MSG=null;
    VIEW='app';
    save();render();
    window.scrollTo(0,0);
  }
});

document.addEventListener('keydown',function(ev){
  if((ev.key==='Enter'||ev.key===' ')&&ev.target&&ev.target.getAttribute&&ev.target.getAttribute('data-act')==='openstat'){
    ev.preventDefault();ev.target.click();return;
  }
  if(ev.key==='Escape'&&VIEW==='settings'){VIEW='app';render();return;}
  if(ev.key==='Escape'&&NEWEV){NEWEV=null;render();return;}
  if(ev.key==='Escape'&&OFF_CONFIRM!==null){OFF_CONFIRM=null;render();return;}
  if(ev.key==='Escape'&&R5UNCUFF){R5UNCUFF=null;render();return;}
  if(ev.key==='Escape'&&R5CUFF){R5CUFF=null;render();return;}
  if(ev.key==='Escape'&&EDIT_NAME){EDIT_NAME=null;render();return;}
  if(ev.key==='Escape'&&OPEN_STAT){OPEN_STAT=null;render();return;}
  if(ev.key==='Enter'&&EDIT_NAME&&ev.target&&/^e(name|num)$/.test(ev.target.id||'')){
    ev.preventDefault();
    var eb=document.querySelector('[data-act="editsave"]');
    if(eb)eb.click();
    return;
  }
  if(ev.key==='Enter'&&ADD_OPEN!==null&&ev.target&&/^add(name|num|note)$/.test(ev.target.id||'')){
    ev.preventDefault();
    var b=document.querySelector('[data-act="addconfirm"]');
    if(b)b.click();
  }
  if(ev.key==='Enter'&&ev.target&&ev.target.id==='r5name'){
    ev.preventDefault();
    var rb=document.querySelector('[data-act="r5add"]');
    if(rb)rb.click();
  }
});
document.addEventListener('input',function(ev){
  var t=ev.target;if(!t)return;
  if(t.id==='addname'||t.id==='r5name'||t.id==='nevtitle')t.classList.remove('bad');
  if(t.id==='tsRange'){
    PREFS.textSize=parseFloat(t.value)||1;applyPrefs();savePrefs();
    var tl=document.getElementById('tsVal');if(tl)tl.textContent=Math.round(PREFS.textSize*100)+'%';
  }
  if(t.id==='zoomRange'){
    PREFS.zoom=parseFloat(t.value)||1;applyPrefs();savePrefs();
    var zl=document.getElementById('zoomVal');if(zl)zl.textContent=Math.round(PREFS.zoom*100)+'%';
  }
});

// ───────────────────────── אתחול ─────────────────────────
if(!CAN_SAVE)document.getElementById('nosave').style.display='block';
load();
loadPrefs();
applyPrefs();
rebuildR5();
render();
</script>
</body>
</html>
